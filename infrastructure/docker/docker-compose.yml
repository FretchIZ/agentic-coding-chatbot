version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: learning_platform
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d learning_platform']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  api:
    build:
      context: ..
      dockerfile: infrastructure/docker/api.Dockerfile
    ports:
      - '8000:8000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://app:${DB_PASSWORD:-changeme}@postgres:5432/learning_platform
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  ai-agent:
    build:
      context: ..
      dockerfile: infrastructure/docker/ai-agent.Dockerfile
    ports:
      - '8001:8001'
    environment:
      NODE_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AI_MODEL: gpt-4
    depends_on:
      - api

  web:
    build:
      context: ..
      dockerfile: infrastructure/docker/web.Dockerfile
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/chat
    depends_on:
      - api

  admin:
    build:
      context: ..
      dockerfile: infrastructure/docker/admin.Dockerfile
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/sites:/etc/nginx/sites-enabled
    depends_on:
      - api
      - web
      - admin

volumes:
  postgres_data:
  redis_data: