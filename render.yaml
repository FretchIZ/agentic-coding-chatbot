services:
  - type: web
    name: agentic-coding-chatbot-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -e ".[dev]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: nvidia
      - key: OPENAI_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_MODEL
        value: meta/llama-3.3-70b-instruct
      - key: DEBUG
        value: "false"
      - key: WORKSPACE_DIR
        value: ./workspace
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
    autoDeploy: true